<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4ede4" id="metaTheme">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Taipei 2026">
  <meta name="description" content="Taipei Trip 2026 · 14–17 April · Day-by-day itinerary">
  <title>Taipei Trip 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* ── Variables ───────────────────────────────────── */
    :root {
      --bg:      #0f0f0f;
      --card:    #181818;
      --raised:  #222;
      --text:    #e8e0d5;
      --muted:   #6a5a4a;
      --accent:  #C8A97E;
      --border:  #2e2e2e;
      --shadow:  0 4px 20px rgba(0,0,0,.6);
      --r:       12px;
      --font:    Georgia, 'Times New Roman', serif;
    }
    [data-theme="light"] {
      --bg:     #f4ede4;
      --card:   #fff;
      --raised: #ece4db;
      --text:   #2a200e;
      --muted:  #8a7060;
      --accent: #8a6030;
      --border: #d4c8bc;
      --shadow: 0 4px 20px rgba(0,0,0,.12);
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100svh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ──────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
      padding-top: calc(14px + env(safe-area-inset-top));
    }
    .hdr-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .hdr-title { flex: 1; }
    .hdr-title h1 { font-size: 1.25rem; color: var(--accent); letter-spacing: .04em; }
    .hdr-title p  { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .hdr-actions  { display: flex; gap: 6px; flex-shrink: 0; }

    .btn {
      background: var(--raised); border: 1px solid var(--border);
      color: var(--text); padding: 7px 13px; border-radius: 8px;
      cursor: pointer; font-family: var(--font); font-size: .8rem;
      transition: background .15s, color .15s, border-color .15s; white-space: nowrap;
    }
    .btn:hover { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }
    .btn-icon { padding: 7px 10px; font-size: 1rem; }
    .btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }

    /* ── Search ──────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; background: var(--raised); border: 1px solid var(--border);
      color: var(--text); padding: 8px 36px 8px 12px; border-radius: 8px;
      font-family: var(--font); font-size: .9rem; outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0 2px; display: none;
    }
    .search-clear.vis { display: block; }

    /* ── Day Tabs ─────────────────────────────────────── */
    .tabs {
      display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px;
      background: var(--card); border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; background: var(--raised); border: 2px solid transparent;
      color: var(--text); padding: 8px 16px; border-radius: var(--r);
      cursor: pointer; font-family: var(--font); font-size: .78rem;
      text-align: center; transition: border-color .2s, color .2s; line-height: 1.4;
    }
    .tab strong { display: block; font-size: 1rem; }
    .tab.active { border-color: var(--tab-c); color: var(--tab-c); background: var(--bg); }

    /* ── Map ─────────────────────────────────────────── */
    #map { height: 260px; width: 100%; z-index: 1; }
    @media (min-width: 600px) { #map { height: 320px; } }
    .map-pin {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; border: 2.5px solid rgba(255,255,255,.8);
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }

    /* ── Content ─────────────────────────────────────── */
    .content { padding: 16px; max-width: 700px; margin: 0 auto; }
    .day-hdr { margin-bottom: 16px; }
    .day-hdr h2 { font-size: 1.1rem; letter-spacing: .03em; }
    .day-hdr .theme { font-size: .85rem; color: var(--muted); margin-top: 2px; }

    /* ── Day Header ──────────────────────────────────── */
    .day-hdr-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .reset-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: .75rem;
      font-family: var(--font); white-space: nowrap; flex-shrink: 0; margin-top: 2px;
      transition: border-color .15s, color .15s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Place List ──────────────────────────────────── */
    .plist { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .pcard {
      background: var(--card); border: 1px solid var(--border);
      border-left: 4px solid var(--dc, var(--accent));
      border-radius: var(--r); padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: box-shadow .15s;
    }
    .pcard:hover { box-shadow: var(--shadow); }
    .pcard.sortable-ghost  { opacity: .35; }
    .pcard.sortable-chosen { cursor: grabbing; box-shadow: 0 8px 30px rgba(0,0,0,.5); }

    .drag-h { color: var(--muted); cursor: grab; font-size: 1.1rem; flex-shrink: 0; user-select: none; padding-top: 1px; }
    .p-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; padding-top: 1px; }
    .p-info { flex: 1; min-width: 0; }
    .p-time { font-size: .72rem; color: var(--muted); font-family: 'Courier New', monospace; letter-spacing: .05em; margin-bottom: 3px; }
    .p-name { font-size: .95rem; font-weight: bold; line-height: 1.3; }
    .p-note { font-size: .78rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .p-meta { display: flex; align-items: center; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .dur-badge {
      font-size: .7rem; padding: 2px 8px; border-radius: 20px; cursor: pointer;
      background: var(--raised); border: 1px solid var(--border);
      transition: border-color .15s; white-space: nowrap;
    }
    .dur-badge:hover { border-color: var(--accent); color: var(--accent); }
    .dur-inp {
      font-size: .7rem; width: 52px; padding: 2px 6px; border-radius: 6px;
      background: var(--raised); border: 1px solid var(--accent);
      color: var(--text); text-align: center; outline: none; font-family: monospace;
    }
    .dep-sep { font-size: .7rem; color: var(--border); }
    .dep-time { font-size: .7rem; color: var(--muted); font-family: 'Courier New', monospace; }
    .card-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .loc-btn, .del-btn {
      background: none; border: none; cursor: pointer; font-size: 1rem;
      padding: 2px; opacity: .5; transition: opacity .15s;
    }
    .loc-btn:hover { opacity: 1; }
    .del-btn:hover { opacity: 1; }

    /* ── Search View ─────────────────────────────────── */
    #searchView { display: none; }
    .s-badge {
      display: inline-block; font-size: .7rem; padding: 2px 8px;
      border-radius: 20px; color: #fff; margin-right: 8px; opacity: .85;
    }
    .s-hdr { font-size: .85rem; color: var(--muted); margin-bottom: 14px; }
    .no-result { text-align: center; color: var(--muted); padding: 40px 0; font-size: .95rem; }

    /* ── Print View ──────────────────────────────────── */
    #printView { display: none; }
    .pr-day { margin-bottom: 28px; }
    .pr-title {
      font-size: 1rem; font-weight: bold;
      border-bottom: 2px solid currentColor;
      padding-bottom: 6px; margin-bottom: 12px;
    }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--raised); border: 1px solid var(--accent);
      color: var(--text); padding: 10px 20px; border-radius: 20px;
      font-size: .85rem; z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Transit Row ─────────────────────────────────── */
    .transit-row {
      list-style: none; display: flex; align-items: flex-start;
      padding: 0 14px 0 50px; gap: 8px;
    }
    .transit-inner { flex: 1; padding: 4px 0; }
    .transit-chips { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .t-chip {
      font-size: .7rem; padding: 4px 10px; border-radius: 20px; cursor: pointer;
      background: var(--raised); border: 1px solid var(--border); white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
      font-family: var(--font);
    }
    .t-chip:hover { border-color: var(--accent); }
    .t-chip.sel {
      background: var(--accent); color: #1a0e00;
      border-color: var(--accent); font-weight: bold;
    }
    .t-summary { font-size: .7rem; color: var(--muted); margin-left: 2px; }
    .transit-detail { display: none; margin-top: 6px; }
    .transit-row.open .transit-detail { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .gmaps-link {
      font-size: .75rem; color: var(--accent); text-decoration: none;
      padding: 4px 10px; border: 1px solid var(--accent); border-radius: 20px;
    }
    .t-dist { font-size: .68rem; color: var(--muted); margin-right: 2px; }

    /* ── Add Place Button & Modal ─────────────────────── */
    .add-place-btn {
      width: 100%; background: none; border: 2px dashed var(--border);
      color: var(--muted); padding: 12px; border-radius: var(--r);
      font-family: var(--font); font-size: .9rem; cursor: pointer; margin-top: 12px;
      transition: border-color .15s, color .15s;
    }
    .add-place-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 500; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--card); width: 100%; max-width: 700px;
      border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      max-height: 82vh; overflow-y: auto;
    }
    .modal-hdr {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .modal-hdr h3 { font-size: 1rem; color: var(--accent); }
    .modal-close {
      background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted);
    }
    .nom-result {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); margin-bottom: 6px; transition: background .15s;
    }
    .nom-result:hover, .nom-result.selected { background: var(--raised); border-color: var(--accent); }
    .nom-name { font-weight: bold; font-size: .88rem; }
    .nom-local { font-weight: normal; font-size: .78rem; color: var(--muted); margin-left: 4px; }
    .nom-addr { font-size: .73rem; color: var(--muted); margin-top: 2px; }
    .nom-empty { color: var(--muted); font-size: .85rem; padding: 10px 0; }

    /* ── Meals Section ───────────────────────────────── */
    .meals-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .meals-hdr { font-size: .78rem; font-weight: bold; color: var(--muted); letter-spacing: .06em;
                 text-transform: uppercase; margin-bottom: 12px; }
    .meal-slot { margin-bottom: 16px; }
    .meal-slot-hdr {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px;
    }
    .meal-slot-title { font-size: .92rem; font-weight: bold; color: var(--text); }
    .meal-slot-time  { font-size: .72rem; color: var(--muted); }
    .meal-slot-area  { font-size: .72rem; color: var(--accent); }
    .meal-opts { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
                 scrollbar-width: none; }
    .meal-opts::-webkit-scrollbar { display: none; }
    .meal-opt {
      flex: 0 0 auto; width: 160px; background: var(--card);
      border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px;
      cursor: pointer; transition: border-color .15s, box-shadow .15s; position: relative;
    }
    .meal-opt:hover { border-color: var(--accent); }
    .meal-opt.selected {
      border-color: var(--accent); background: var(--raised);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .meal-opt.selected::after { content: '✓'; position: absolute; top: 7px; right: 9px;
      color: var(--accent); font-size: .8rem; font-weight: bold; }
    .rank-badge {
      display: inline-block; font-size: .65rem; font-weight: bold; padding: 1px 6px;
      border-radius: 10px; background: var(--raised); border: 1px solid var(--border);
      color: var(--muted); margin-bottom: 5px;
    }
    .meal-opt:nth-child(1) .rank-badge { background: #ffd700; border-color: #c8a600; color: #5a4200; }
    .meal-opt:nth-child(2) .rank-badge { background: #d8d8d8; border-color: #a0a0a0; color: #303030; }
    .meal-opt:nth-child(3) .rank-badge { background: #e8b080; border-color: #b06820; color: #3a1800; }
    .meal-opt-name { font-size: .82rem; font-weight: bold; color: var(--text);
                     line-height: 1.3; margin-bottom: 3px; }
    .meal-opt-local { font-size: .72rem; color: var(--muted); margin-bottom: 4px; }
    .meal-opt-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .meal-tag {
      font-size: .65rem; padding: 2px 6px; border-radius: 8px;
      background: var(--raised); border: 1px solid var(--border); color: var(--muted);
    }
    .meal-tag.price { color: var(--accent); border-color: var(--accent); }
    .meal-opt-note { font-size: .7rem; color: var(--muted); margin-top: 4px; line-height: 1.35; }
    .meal-map-btn {
      display: block; width: 100%; margin-top: 8px; padding: 4px 0;
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: .7rem; cursor: pointer; font-family: var(--font);
      transition: border-color .15s, color .15s;
    }
    .meal-map-btn:hover { border-color: var(--accent); color: var(--accent); }
    .add-form { margin-top: 14px; display: none; }
    .add-form.vis { display: block; }
    .add-form-sel { font-size: .82rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .form-row input {
      flex: 1; background: var(--raised); border: 1px solid var(--border);
      color: var(--text); padding: 8px 10px; border-radius: 8px;
      font-family: var(--font); font-size: .88rem; outline: none;
    }
    .form-row input:focus { border-color: var(--accent); }
    .form-row input.icon-inp { flex: 0 0 60px; text-align: center; font-size: 1.2rem; }
    .add-confirm {
      width: 100%; background: var(--accent); border: none; color: #1a0e00;
      padding: 12px; border-radius: 10px; font-size: 1rem;
      font-family: var(--font); cursor: pointer; font-weight: bold; margin-top: 4px;
    }
    .search-spin { color: var(--muted); font-size: .82rem; padding: 8px 0; }

    /* ── Print Media ─────────────────────────────────── */
    @media print {
      .hdr, .tabs, #map, #singleView, #searchView, #toast { display: none !important; }
      #printView { display: block !important; }
      body { background: #fff !important; color: #000 !important; }
      .pr-head { font-size: 18pt; text-align: center; margin-bottom: 24px; }
      .pr-day  { page-break-inside: avoid; }
      .pr-title { color: #000 !important; border-color: #000 !important; }
      .pcard {
        background: #f8f8f8 !important; border-color: #ccc !important;
        break-inside: avoid; margin-bottom: 6px;
      }
      .drag-h, .loc-btn { display: none !important; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-row">
    <div class="hdr-title">
      <h1>🗺 Taipei Trip 2026</h1>
      <p>14 – 17 April · 4 Days · ไทเป</p>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-icon" id="mrtBtn"   title="Toggle MRT lines" onclick="toggleMRT()">🚇</button>
      <button class="btn btn-icon" id="gpsBtn"   title="My location"      onclick="locateMe()">📍</button>
      <button class="btn btn-icon" id="themeBtn" title="Toggle theme">☀️</button>
      <button class="btn" id="printBtn">🖨 PDF</button>
    </div>
  </div>
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="🔍  ค้นหาสถานที่..." autocomplete="off" spellcheck="false">
    <button class="search-clear" id="searchClear" aria-label="Clear">✕</button>
  </div>
</header>

<!-- ═══ DAY TABS ══════════════════════════════════════ -->
<nav class="tabs" id="tabs"></nav>

<!-- ═══ MAP ═══════════════════════════════════════════ -->
<div id="map"></div>

<!-- ═══ MAIN ══════════════════════════════════════════ -->
<main>
  <!-- Normal single-day view -->
  <div class="content" id="singleView">
    <div class="day-hdr" id="dayHdr"></div>
    <ul class="plist" id="placeList"></ul>
    <div id="mealsSection"></div>
  </div>

  <!-- Search results -->
  <div class="content" id="searchView">
    <div class="s-hdr" id="sHdr"></div>
    <ul class="plist" id="sList"></ul>
  </div>

  <!-- All-days print view -->
  <div class="content" id="printView">
    <div class="pr-head">🗺 Taipei Trip 2026 &nbsp;·&nbsp; 14–17 April</div>
    <div id="printDays"></div>
  </div>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<!-- ═══ ADD PLACE MODAL ════════════════════════════════ -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <h3 id="modalTitle">＋ เพิ่มสถานที่</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="search-wrap">
      <input type="search" id="nomSearch" placeholder="🔍  ค้นหาสถานที่ใน Taipei..." autocomplete="off">
      <button class="search-clear" id="nomClear">✕</button>
    </div>
    <div id="nomResults" style="margin-top:10px"></div>
    <div class="add-form" id="addForm">
      <div class="add-form-sel" id="addFormName"></div>
      <div class="form-row">
        <input type="time" id="addTime" value="10:00">
        <input type="text" id="addIcon" class="icon-inp" value="📍" placeholder="icon" maxlength="2">
      </div>
      <div class="form-row">
        <input type="text" id="addNote" placeholder="หมายเหตุ (optional)">
      </div>
      <button class="add-confirm" id="addConfirm">เพิ่มลงแผน</button>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ════════════════════════════════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
'use strict';

/* ── Fallback data (offline / fetch fail) ──────────── */

/* ── Init ──────────────────────────────────────────── */
async function init() {
  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved === 'dark', false);

  try {
    const res = await fetch('./data/itinerary.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    console.warn('Offline – using fallback data', e);
    data = JSON.parse(JSON.stringify(FALLBACK));

  }

  // snapshot original data for reset
  originalData = JSON.parse(JSON.stringify(data));

  // restore saved user state (transit modes, times, durations, meal picks, place order)
  try {
    const saved = localStorage.getItem('taipei-trip-state');
    if (saved) {
      const savedData = JSON.parse(saved);
      if (savedData.days && savedData.days.length === data.days.length) {
        data = savedData;
      }
    }
  } catch(e) {}

  buildTabs();
  initMap();
  selectDay(0);
  buildPrintView();
  bindEvents();
}

/* ── Persist state ─────────────────────────────────── */
function saveState() {
  try { localStorage.setItem('taipei-trip-state', JSON.stringify(data)); } catch(e) {}
}

/* ── Tabs ──────────────────────────────────────────── */
function buildTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  data.days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.style.setProperty('--tab-c', day.color);
    const parts = day.date.split(' ');
    btn.innerHTML = `<strong>Day ${day.day}</strong><span>${parts[0]} ${parts[1]}</span>`;
    btn.addEventListener('click', () => { clearSearch(); selectDay(i); });
    nav.appendChild(btn);
  });
}

function setActiveTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
}

/* ── Select Day ────────────────────────────────────── */
function selectDay(i) {
  curDay = i;
  setActiveTab(i);
  renderDay(i);
  updateMap(i);
}

/* ── Reset Day ─────────────────────────────────────── */
function resetDay(i) {
  if (!originalData) return;
  if (!confirm(`รีเซ็ต Day ${data.days[i].day} กลับเป็นแผนเดิม?`)) return;
  data.days[i].places = JSON.parse(JSON.stringify(originalData.days[i].places));
  delete data.days[i].transitModes;
  saveState();
  selectDay(i);
  toast(`Day ${data.days[i].day} รีเซ็ตแล้ว ✓`);
}

/* ── Render Day ────────────────────────────────────── */
function renderDay(i) {
  const day = data.days[i];
  document.getElementById('dayHdr').innerHTML =
    `<div class="day-hdr-row">
       <div>
         <h2 style="color:${day.color}">Day ${day.day} · ${day.date}</h2>
         <p class="theme">${day.theme}</p>
       </div>
       <button class="reset-btn" onclick="resetDay(${i})" title="รีเซ็ตกลับแผนเดิม">↺ default</button>
     </div>`;

  const list = document.getElementById('placeList');
  list.innerHTML = '';

  day.places.forEach((p, pi) => {
    const card = makeCard(p, day.color, true, i, pi);
    card.dataset.placeIdx = pi;
    list.appendChild(card);
    if (pi < day.places.length - 1) {
      const tr = makeTransitRow(p, day.places[pi + 1], i, pi);
      if (tr) list.appendChild(tr);
    }
  });

  // Add place button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-place-btn';
  addBtn.textContent = '＋ เพิ่มสถานที่';
  addBtn.addEventListener('click', () => openAddModal(i));
  list.parentElement.appendChild(addBtn);

  if (sortable) sortable.destroy();
  sortable = Sortable.create(list, {
    handle: '.drag-h', animation: 180,
    filter: '.transit-row', draggable: '.pcard',
    ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
    onEnd() {
      const snapshot = [...day.places];
      const cards = [...list.querySelectorAll('.pcard')];
      day.places = cards.map(el => snapshot[parseInt(el.dataset.placeIdx)]);
      toast('ย้ายสถานที่เรียบร้อย ✓');
      renderDay(i);
      updateMap(i);
      saveState();
    }
  });

  renderMeals(i);
}

/* ── Meals Section ─────────────────────────────────── */
function renderMeals(dayIdx) {
  const sec = document.getElementById('mealsSection');
  sec.innerHTML = '';
  const day = data.days[dayIdx];
  if (!day.meals || !day.meals.length) return;

  const wrap = document.createElement('div');
  wrap.className = 'meals-section';
  wrap.innerHTML = '<div class="meals-hdr">🍽 แนะนำร้านอาหาร</div>';

  day.meals.forEach(meal => {
    const slotDiv = document.createElement('div');
    slotDiv.className = 'meal-slot';
    slotDiv.innerHTML = `<div class="meal-slot-hdr">
      <span class="meal-slot-title">${meal.slot}</span>
      <span class="meal-slot-time">${meal.time}</span>
      <span class="meal-slot-area">· ${meal.area}</span>
    </div>`;

    const optsRow = document.createElement('div');
    optsRow.className = 'meal-opts';

    meal.options.forEach((opt, oi) => {
      const card = document.createElement('div');
      card.className = 'meal-opt';
      if (meal._selected === oi) card.classList.add('selected');

      const rankLabels = ['#1 Top Pick', '#2', '#3', '#4'];
      card.innerHTML =
        `<div class="rank-badge">${rankLabels[oi] || `#${oi+1}`}</div>` +
        `<div class="meal-opt-name">${esc(opt.nameEn || opt.name)}</div>` +
        (opt.nameEn && opt.name && opt.nameEn !== opt.name
          ? `<div class="meal-opt-local">${esc(opt.name)}</div>` : '') +
        `<div class="meal-opt-meta">
          <span class="meal-tag">${esc(opt.cuisine)}</span>
          <span class="meal-tag price">${esc(opt.price)}</span>
          <span class="meal-tag">${esc(opt.rating)}</span>
        </div>` +
        (opt.note ? `<div class="meal-opt-note">${esc(opt.note)}</div>` : '') +
        (opt.lat ? `<button class="meal-map-btn">📍 ดูบนแผนที่</button>` : '');

      card.addEventListener('click', e => {
        if (e.target.classList.contains('meal-map-btn')) return;
        meal._selected = (meal._selected === oi) ? undefined : oi;
        saveState();
        renderMeals(dayIdx);
      });

      if (opt.lat) {
        const mapBtn = card.querySelector('.meal-map-btn');
        if (mapBtn) {
          mapBtn.addEventListener('click', e => {
            e.stopPropagation();
            map.setView([opt.lat, opt.lng], 17, { animate: true });
            L.popup({ offset: [0, -10] })
              .setLatLng([opt.lat, opt.lng])
              .setContent(`<b>${esc(opt.nameEn || opt.name)}</b><br>${esc(opt.note || '')}`)
              .openOn(map);
          });
        }
      }

      optsRow.appendChild(card);
    });

    slotDiv.appendChild(optsRow);
    wrap.appendChild(slotDiv);
  });

  sec.appendChild(wrap);
}

/* ── Place Card ────────────────────────────────────── */
function makeCard(p, color, draggable, dayIdx, placeIdx) {
  const li = document.createElement('li');
  li.className = 'pcard';
  li.style.setProperty('--dc', color);
  const hasLL = p.lat != null;
  const dur = p.duration || 60;

  li.innerHTML =
    (draggable ? `<span class="drag-h" title="Drag to reorder">⠿</span>` : '') +
    `<span class="p-icon">${p.icon}</span>
     <div class="p-info">
       <div class="p-time">${p.time}</div>
       <div class="p-name">${esc(p.name)}</div>
       ${p.note ? `<div class="p-note">${esc(p.note)}</div>` : ''}
       ${draggable ? `<div class="p-meta">
         <span class="dur-badge" title="เวลาที่ใช้ที่สถานที่นี้ (คลิกเพื่อแก้)">⏱ ${fmtDur(dur)}</span>
         <span class="dep-sep">→ ออก</span>
         <span class="dep-time">${getDep(p)}</span>
       </div>` : ''}
     </div>
     <div class="card-actions">
       ${hasLL ? `<button class="loc-btn" data-lat="${p.lat}" data-lng="${p.lng}" title="Show on map">📍</button>` : ''}
       ${draggable ? `<button class="del-btn" title="ลบสถานที่นี้">🗑</button>` : ''}
     </div>`;

  if (draggable && dayIdx !== undefined) {
    const durBadge = li.querySelector('.dur-badge');
    durBadge.addEventListener('click', e => {
      e.stopPropagation();
      const inp = document.createElement('input');
      inp.type = 'number'; inp.min = 5; inp.max = 480;
      inp.value = p.duration || 60; inp.className = 'dur-inp';
      durBadge.replaceWith(inp);
      inp.focus(); inp.select();

      function saveDur() {
        const val = Math.max(5, Math.min(480, parseInt(inp.value) || 60));
        p.duration = val;
        const newBadge = document.createElement('span');
        newBadge.className = 'dur-badge';
        newBadge.title = 'เวลาที่ใช้ที่สถานที่นี้ (คลิกเพื่อแก้)';
        newBadge.textContent = `⏱ ${fmtDur(val)}`;
        inp.replaceWith(newBadge);
        // re-bind click
        newBadge.addEventListener('click', durBadge.onclick);
        makeCard._rebind(newBadge, p, dayIdx, placeIdx);
        // update departure display
        const depEl = li.querySelector('.dep-time');
        if (depEl) depEl.textContent = getDep(p);
        // cascade
        cascadeTimes(dayIdx, placeIdx);
        saveState();
      }
      inp.addEventListener('blur', saveDur);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') inp.blur(); });
    });
    makeCard._rebind = (badge, place, dIdx, pIdx) => {
      badge.addEventListener('click', e => {
        e.stopPropagation();
        const inp = document.createElement('input');
        inp.type = 'number'; inp.min = 5; inp.max = 480;
        inp.value = place.duration || 60; inp.className = 'dur-inp';
        badge.replaceWith(inp); inp.focus(); inp.select();
        function save() {
          const val = Math.max(5, Math.min(480, parseInt(inp.value) || 60));
          place.duration = val;
          const nb = document.createElement('span');
          nb.className = 'dur-badge'; nb.title = 'คลิกเพื่อแก้';
          nb.textContent = `⏱ ${fmtDur(val)}`;
          inp.replaceWith(nb); makeCard._rebind(nb, place, dIdx, pIdx);
          const depEl = nb.closest('.pcard')?.querySelector('.dep-time');
          if (depEl) depEl.textContent = getDep(place);
          cascadeTimes(dIdx, pIdx);
        }
        inp.addEventListener('blur', save);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === 'Escape') inp.blur(); });
      });
    };
  }
  return li;
}

/* ── Map ───────────────────────────────────────────── */
function initMap() {
  map = L.map('map', { zoomControl: false, scrollWheelZoom: false });
  L.control.zoom({ position: 'topright' }).addTo(map);
  setTiles();
  map.setView([25.0478, 121.5319], 12);
}

/* ── MRT Layer ─────────────────────────────────────── */
function toggleMRT() {
  mrtVisible = !mrtVisible;
  const btn = document.getElementById('mrtBtn');
  if (mrtVisible) {
    MRT_LINES.forEach(line => {
      const pl = L.polyline(line.coords, { color: line.color, weight: 3, opacity: 0.85 })
        .bindTooltip(line.name, { sticky: true })
        .addTo(map);
      mrtLayers.push(pl);
    });
    btn.classList.add('active');
    toast('แสดงเส้น MRT แล้ว');
  } else {
    mrtLayers.forEach(l => map.removeLayer(l));
    mrtLayers = [];
    btn.classList.remove('active');
  }
}

/* ── Route Polyline ────────────────────────────────── */
function drawRoute(dayIdx) {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  const pts = data.days[dayIdx].places.filter(p => p.lat != null).map(p => [p.lat, p.lng]);
  if (pts.length < 2) return;
  routeLine = L.polyline(pts, {
    color: data.days[dayIdx].color, weight: 3, opacity: 0.7, dashArray: '8 6'
  }).addTo(map);
}

/* ── GPS Location ──────────────────────────────────── */
function locateMe() {
  if (!navigator.geolocation) { toast('Browser ไม่รองรับ GPS'); return; }
  const btn = document.getElementById('gpsBtn');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (gpsMarker) map.removeLayer(gpsMarker);
      gpsMarker = L.circleMarker([lat, lng], {
        radius: 10, color: '#4A90E2', fillColor: '#4A90E2',
        fillOpacity: 0.9, weight: 3
      }).bindPopup('<b>📍 คุณอยู่ที่นี่</b>').addTo(map).openPopup();
      map.setView([lat, lng], 15, { animate: true });
      btn.textContent = '📍';
      toast('พบตำแหน่งของคุณแล้ว');
    },
    err => { btn.textContent = '📍'; toast('ไม่สามารถระบุตำแหน่งได้'); }
  );
}

function setTiles() {
  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(
    isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution: '© <a href="https://carto.com/">CartoDB</a>', subdomains: 'abcd', maxZoom: 19 }
  ).addTo(map);
}

function updateMap(i) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const day = data.days[i];
  const pts = day.places.filter(p => p.lat != null);
  pts.forEach(p => {
    const icon = L.divIcon({
      html: `<div class="map-pin" style="background:${day.color}">${p.icon}</div>`,
      className: '', iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-20]
    });
    const m = L.marker([p.lat, p.lng], { icon })
      .bindPopup(`<b>${esc(p.name)}</b><br><small>${p.time}</small>`)
      .addTo(map);
    markers.push(m);
  });
  drawRoute(i);
  if (pts.length === 1) {
    map.setView([pts[0].lat, pts[0].lng], 14);
  } else if (pts.length > 1) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.25));
  }
}

function focusMarker(lat, lng) {
  map.setView([lat, lng], 16, { animate: true });
  const m = markers.find(mk => {
    const ll = mk.getLatLng();
    return Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lng) < 0.0001;
  });
  if (m) m.openPopup();
  document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Search ────────────────────────────────────────── */
function doSearch(q) {
  q = q.trim().toLowerCase();
  const sv = document.getElementById('singleView');
  const rv = document.getElementById('searchView');
  const clr = document.getElementById('searchClear');

  if (!q) {
    sv.style.display = '';
    rv.style.display = 'none';
    clr.classList.remove('vis');
    return;
  }
  clr.classList.add('vis');
  sv.style.display = 'none';
  rv.style.display = '';

  const results = [];
  data.days.forEach(day =>
    day.places.forEach(p => {
      if (p.name.toLowerCase().includes(q) || (p.note && p.note.toLowerCase().includes(q)))
        results.push({ p, day });
    })
  );

  const hdr  = document.getElementById('sHdr');
  const list = document.getElementById('sList');

  if (!results.length) {
    hdr.innerHTML = '';
    list.innerHTML = `<li class="no-result">ไม่พบ "<em>${esc(q)}</em>"</li>`;
    return;
  }

  hdr.innerHTML = `พบ <strong>${results.length}</strong> สถานที่`;
  list.innerHTML = '';
  results.forEach(({ p, day }) => {
    const li = makeCard(p, day.color, false);
    const badge = document.createElement('span');
    badge.className = 's-badge';
    badge.style.background = day.color;
    badge.textContent = `Day ${day.day}`;
    li.insertBefore(badge, li.firstChild);
    list.appendChild(li);
  });
}

function clearSearch() {
  const inp = document.getElementById('searchInput');
  inp.value = '';
  doSearch('');
}

/* ── Print view ────────────────────────────────────── */
function buildPrintView() {
  document.getElementById('printDays').innerHTML = data.days.map(day => `
    <div class="pr-day">
      <div class="pr-title" style="color:${day.color}">Day ${day.day} · ${day.date} · ${day.theme}</div>
      <ul class="plist">
        ${day.places.map(p => `
          <li class="pcard" style="--dc:${day.color}">
            <span class="p-icon">${p.icon}</span>
            <div class="p-info">
              <div class="p-time">${p.time}</div>
              <div class="p-name">${esc(p.name)}</div>
              ${p.note ? `<div class="p-note">${esc(p.note)}</div>` : ''}
            </div>
          </li>`).join('')}
      </ul>
    </div>`).join('');
}

/* ── Theme ─────────────────────────────────────────── */
function applyTheme(dark, updateMap_ = true) {
  isDark = dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  document.getElementById('metaTheme').content = dark ? '#0f0f0f' : '#f4ede4';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  if (updateMap_ && map) setTiles();
}

/* ── Toast ─────────────────────────────────────────── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── Events ────────────────────────────────────────── */
function bindEvents() {
  document.getElementById('themeBtn').addEventListener('click', () => applyTheme(!isDark));
  document.getElementById('printBtn').addEventListener('click', () => window.print());

  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', e => doSearch(e.target.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Escape') clearSearch(); });

  document.getElementById('searchClear').addEventListener('click', () => {
    clearSearch();
    inp.focus();
  });

  // Delegated locate button
  document.addEventListener('click', e => {
    const loc = e.target.closest('.loc-btn');
    if (loc) { focusMarker(parseFloat(loc.dataset.lat), parseFloat(loc.dataset.lng)); return; }

    // Delegated delete button
    const del = e.target.closest('.del-btn');
    if (!del) return;
    const card = del.closest('.pcard');
    const idx  = parseInt(card.dataset.placeIdx);
    const day  = data.days[curDay];
    const name = day.places[idx]?.name || 'สถานที่นี้';
    if (!confirm(`ลบ "${name}" ออกจากแผน?`)) return;
    day.places.splice(idx, 1);
    saveState();
    renderDay(curDay);
    updateMap(curDay);
    toast(`ลบ "${name}" แล้ว`);
  });

  // Modal close
  document.getElementById('modalClose').addEventListener('click', closeAddModal);
  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal')) closeAddModal();
  });

  // Nominatim search
  const nomInp = document.getElementById('nomSearch');
  const nomClr = document.getElementById('nomClear');
  nomInp.addEventListener('input', e => {
    const q = e.target.value;
    nomClr.style.display = q ? 'block' : 'none';
    clearTimeout(nomTimer);
    nomTimer = setTimeout(() => nominatimSearch(q), 400);
  });
  nomClr.addEventListener('click', () => {
    nomInp.value = '';
    nomClr.style.display = 'none';
    document.getElementById('nomResults').innerHTML = '';
    document.getElementById('addForm').classList.remove('vis');
    nomInp.focus();
  });

  // Add confirm
  document.getElementById('addConfirm').addEventListener('click', confirmAddPlace);
  document.getElementById('addIcon').addEventListener('focus', e => e.target.select());
}

/* ── Util ──────────────────────────────────────────── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Transit Helpers ───────────────────────────────── */
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, r = Math.PI / 180;
  const dL = (lat2 - lat1) * r, dG = (lng2 - lng1) * r;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function travelEst(km) {
  const walk = Math.max(5,  Math.round(km * 1.3 / 5 * 60));
  const mrt  = Math.max(10, Math.round(km * 2.5 + 8));
  const taxi = Math.max(8,  Math.round(km * 2.2 + 5));
  const ntd  = Math.round(85 + Math.max(0, km - 1.25) * 25);
  return { walk, mrt, taxi, ntd, km: km.toFixed(1) };
}

function parseMins(t) {
  const [h, m] = (t || '00:00').split(':').map(Number);
  return h * 60 + m;

}
function fmtTime(mins) {
  return `${String(Math.floor(mins/60)%24).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
}
function fmtDur(m) {
  if (m < 60) return `${m}m`;
  return m % 60 ? `${Math.floor(m/60)}h${m%60}m` : `${Math.floor(m/60)}h`;
}
function getDep(place) {
  return fmtTime(parseMins(place.time) + (place.duration || 60));
}

/* Cascade times from transit[startIdx] onwards using stored transitModes */
function cascadeTimes(dayIdx, startIdx) {
  const day = data.days[dayIdx];
  if (!day.transitModes) return;
  const list = document.getElementById('placeList');
  if (!list) return;
  const pcards = [...list.querySelectorAll('.pcard')];

  for (let i = startIdx; i < day.places.length - 1; i++) {
    const m = day.transitModes[i];
    if (!m) continue;
    // departure = arrival + duration; next arrival = departure + transit
    const dep = parseMins(day.places[i].time) + (day.places[i].duration || 60);
    const newTime = fmtTime(dep + m.minutes);
    day.places[i + 1].time = newTime;
    if (pcards[i + 1]) {
      const el = pcards[i + 1].querySelector('.p-time');
      if (el) el.textContent = newTime;
      // also refresh departure display of place i
      const depEl = pcards[i] ? pcards[i].querySelector('.dep-time') : null;
      if (depEl) depEl.textContent = fmtTime(dep);
    }
  }
}

function makeTransitRow(p1, p2, dayIdx, transitIdx) {
  if (!p1.lat || !p2.lat) return null;
  const est = travelEst(haversine(p1.lat, p1.lng, p2.lat, p2.lng));
  const modes = [
    { key:'walk', icon:'🚶', label:`${est.walk} นาที`,                  minutes: est.walk, gmMode:'walking'  },
    { key:'mrt',  icon:'🚇', label:`~${est.mrt} นาที`,                  minutes: est.mrt,  gmMode:'transit'  },
    { key:'taxi', icon:'🚕', label:`~${est.taxi} นาที ≈NT$${est.ntd}`,  minutes: est.taxi, gmMode:'driving'  }
  ];

  // restore previously selected mode if any
  const day = data.days[dayIdx];
  if (!day.transitModes) day.transitModes = {};
  const saved = day.transitModes[transitIdx];
  let selMode = saved ? modes.find(m => m.key === saved.key) || modes[1] : modes[1];

  const li = document.createElement('li');
  li.className = 'transit-row';

  function gmUrl() {
    return `https://www.google.com/maps/dir/?api=1&origin=${p1.lat},${p1.lng}&destination=${p2.lat},${p2.lng}&travelmode=${selMode.gmMode}`;
  }

  function render() {
    li.innerHTML = `
      <div class="transit-inner">
        <div class="transit-chips">
          <span class="t-dist">${est.km} km</span>
          ${modes.map(m => `
            <button class="t-chip${m.key === selMode.key ? ' sel' : ''}" data-mode="${m.key}">
              ${m.icon} ${m.label}
            </button>`).join('')}
        </div>
        <div class="transit-detail">
          <a class="gmaps-link" href="${gmUrl()}" target="_blank" rel="noopener">
            🗺 Google Maps (${selMode.icon})
          </a>
        </div>
      </div>`;

    li.querySelectorAll('.t-chip').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        selMode = modes.find(m => m.key === btn.dataset.mode);
        day.transitModes[transitIdx] = selMode;
        li.classList.add('open');
        render();
        cascadeTimes(dayIdx, transitIdx);
        saveState();
        toast(`อัปเดตเวลาจาก ${selMode.icon} แล้ว`);
      });
    });
  }

  render();
  li.addEventListener('click', e => {
    if (e.target.closest('a') || e.target.closest('.t-chip')) return;
    li.classList.toggle('open');
  });
  return li;
}

/* ── Add Place (Nominatim) ─────────────────────────── */
let addCtx = { dayIdx: 0, selected: null };
let nomTimer = null;

function openAddModal(dayIdx) {
  addCtx = { dayIdx, selected: null };
  document.getElementById('modalTitle').textContent = `＋ เพิ่มสถานที่ — Day ${data.days[dayIdx].day}`;
  document.getElementById('nomSearch').value = '';
  document.getElementById('nomResults').innerHTML = '';
  document.getElementById('addForm').classList.remove('vis');
  document.getElementById('nomClear').style.display = 'none';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('nomSearch').focus(), 100);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function nominatimSearch(q) {
  q = q.trim();
  if (q.length < 2) { document.getElementById('nomResults').innerHTML = ''; return; }
  const el = document.getElementById('nomResults');
  el.innerHTML = '<div class="search-spin">กำลังค้นหา…</div>';
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&namedetails=1&accept-language=en,zh-TW&viewbox=120.9,24.9,121.7,25.3&bounded=0`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const items = await res.json();
    if (!items.length) { el.innerHTML = '<div class="nom-empty">ไม่พบสถานที่ ลองคำอื่น</div>'; return; }
    el.innerHTML = '';
    items.forEach(item => {
      const nd = item.namedetails || {};
      const nameEn = nd['name:en'] || nd['name:en-US'] || '';
      const nameLocal = nd['name:zh'] || nd['name:zh-TW'] || nd['name'] || item.display_name.split(',')[0];
      const displayName = nameEn || nameLocal;
      const subName = nameEn && nameLocal && nameEn !== nameLocal ? nameLocal : '';
      const addr = item.display_name.split(',').slice(1, 3).join(',').trim();
      const div = document.createElement('div');
      div.className = 'nom-result';
      div.innerHTML = `<div class="nom-name">${esc(displayName)}${subName ? ` <span class="nom-local">${esc(subName)}</span>` : ''}</div><div class="nom-addr">${esc(addr)}</div>`;
      div.addEventListener('click', () => selectNomResult(item, displayName, div));
      el.appendChild(div);
    });
  } catch(e) {
    el.innerHTML = '<div class="nom-empty">เกิดข้อผิดพลาด กรุณาลองใหม่</div>';
  }
}

function selectNomResult(item, name, el) {
  document.querySelectorAll('.nom-result').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  addCtx.selected = { name, lat: parseFloat(item.lat), lng: parseFloat(item.lon) };
  document.getElementById('addFormName').textContent = '📍 ' + name;
  document.getElementById('addForm').classList.add('vis');
  document.getElementById('addForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function confirmAddPlace() {
  if (!addCtx.selected) return;
  const time = document.getElementById('addTime').value || '10:00';
  const icon = document.getElementById('addIcon').value.trim() || '📍';
  const note = document.getElementById('addNote').value.trim();
  const { name, lat, lng } = addCtx.selected;
  const newPlace = { id: 'u' + Date.now(), time, icon, name, lat, lng, note };
  data.days[addCtx.dayIdx].places.push(newPlace);
  saveState();
  closeAddModal();
  selectDay(addCtx.dayIdx);
  toast(`เพิ่ม "${name}" แล้ว ✓`);
}

init().catch(console.error);
